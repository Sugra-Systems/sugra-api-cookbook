name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile all recipes
        run: python -m compileall -q recipes
      - name: Lint recipes (real errors only)
        run: |
          pip install ruff
          ruff check --select E9,F recipes
